<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="筋トレ帳">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<title>筋トレ帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--bg4:#222633;
  --border:#2a2f40;--border2:#353c50;
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555c70;
  --accent:#00e5a0;--accent2:#00b87a;--accent-glow:rgba(0,229,160,0.2);
  --red:#ff4d6d;--amber:#ffa94d;--blue:#4dabf7;--purple:#cc5de8;
  --xp:#ffd43b;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,34px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* ── HEADER ── */
.header{padding:calc(var(--safe-top) + 8px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:2px}
.sync-btn{background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.sync-btn:active{opacity:0.7}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:var(--accent)}
.sync-dot.err{background:var(--red)}
.sync-dot.ing{background:var(--amber);animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.xp-bar-wrap{display:flex;align-items:center;gap:8px}
.level-badge{background:var(--accent);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;padding:2px 8px;border-radius:4px;white-space:nowrap}
.xp-bar-outer{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.xp-bar-inner{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width 0.5s ease}
.xp-text{font-size:11px;color:var(--xp);white-space:nowrap;font-family:'Rajdhani',sans-serif;font-weight:500}

/* ── TABS ── */
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:72px;z-index:9}
.tab-btn{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--text3);border:none;background:none;cursor:pointer;transition:color 0.2s;border-bottom:2px solid transparent}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-icon{font-size:18px;display:block;margin-bottom:2px}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(var(--safe-bottom) + 16px)}
.screen.active{display:block}

/* ── SETUP BANNER ── */
.setup-banner{background:rgba(255,169,77,0.1);border:1px solid rgba(255,169,77,0.4);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--amber);line-height:1.6}
.setup-banner strong{display:block;margin-bottom:4px;font-size:14px}

/* ── HOME ── */
.section-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;font-family:'Rajdhani',sans-serif;font-weight:500}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.menu-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.menu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-color,var(--accent));opacity:0.4}
.menu-card.done{border-color:var(--card-color,var(--accent));background:rgba(0,229,160,0.04)}
.menu-card.done::before{opacity:1}
.menu-card-icon{font-size:24px;margin-bottom:6px}
.menu-card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.menu-card-target{font-size:11px;color:var(--text2)}
.menu-card-check{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--card-color,var(--accent));display:none;align-items:center;justify-content:center;font-size:11px}
.menu-card.done .menu-card-check{display:flex}
.done-stamp{position:absolute;bottom:8px;right:8px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:var(--card-color,var(--accent));opacity:0.8;letter-spacing:1px}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-inner{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;padding-bottom:calc(var(--safe-bottom) + 20px)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px}
.field input,.field select{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--text);font-size:16px;font-family:'Noto Sans JP',sans-serif}
input,select,textarea{font-size:16px !important}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn-cancel{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:12px;color:var(--text2);font-size:14px;cursor:pointer}
.btn-save{background:var(--accent);border:none;border-radius:10px;padding:12px;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}

/* ── XP POPUP ── */
.xp-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--bg2);border:2px solid var(--accent);border-radius:16px;padding:24px 32px;text-align:center;z-index:200;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s}
.xp-popup.show{transform:translate(-50%,-50%) scale(1)}
.xp-popup.hide{transform:translate(-50%,-50%) scale(0);opacity:0}
.xp-popup-amount{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;color:var(--xp)}
.xp-popup-label{font-size:14px;color:var(--text2);margin-top:4px}

/* ── LEVEL UP ── */
.levelup-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;align-items:center;justify-content:center;flex-direction:column}
.levelup-popup.show{display:flex}
.levelup-title{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;color:var(--accent);animation:pulse 0.5s ease infinite alternate;letter-spacing:4px}
.levelup-num{font-family:'Rajdhani',sans-serif;font-size:96px;font-weight:700;color:var(--xp);line-height:1}
.levelup-sub{color:var(--text2);font-size:14px;margin-top:12px}
.levelup-btn{margin-top:24px;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px 40px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
@keyframes pulse{from{opacity:0.7}to{opacity:1}}

/* ── HISTORY ── */
.calendar-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{background:var(--bg4);border:none;color:var(--text2);font-size:18px;padding:4px 10px;border-radius:6px;cursor:pointer}
.cal-month{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;padding-bottom:4px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);position:relative}
.cal-day.has-data{color:var(--text)}
.cal-day.today{color:var(--accent);font-weight:700}
.cal-day .dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-day.today .dot{background:var(--xp)}
.hist-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.hist-date{font-size:12px;color:var(--text2);margin-bottom:8px;font-family:'Rajdhani',sans-serif;font-weight:500}
.hist-items{display:flex;flex-wrap:wrap;gap:6px}
.hist-item{background:var(--bg4);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
.hist-dot{width:6px;height:6px;border-radius:50%}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--text2)}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;transition:height 0.5s ease;min-height:2px}
.bar-label{font-size:9px;color:var(--text3);white-space:nowrap}
.heatmap-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:10px}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--bg4)}
.hm-cell[data-v="1"]{background:rgba(0,229,160,0.3)}
.hm-cell[data-v="2"]{background:rgba(0,229,160,0.55)}
.hm-cell[data-v="3"]{background:rgba(0,229,160,0.8)}
.hm-cell[data-v="4"]{background:rgba(0,229,160,1)}

/* ── SETTINGS ── */
.settings-section{margin-bottom:24px}
.settings-title{font-size:13px;color:var(--text2);margin-bottom:10px;letter-spacing:1px;font-family:'Rajdhani',sans-serif;font-weight:500}
.menu-edit-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.menu-edit-icon{font-size:24px}
.menu-edit-info{flex:1}
.menu-edit-name{font-size:14px;font-weight:500}
.menu-edit-detail{font-size:12px;color:var(--text3);margin-top:2px}
.menu-edit-btns{display:flex;gap:6px}
.btn-edit{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text2);font-size:12px;cursor:pointer}
.btn-delete{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:6px;padding:6px 10px;color:var(--red);font-size:12px;cursor:pointer}
.add-btn{width:100%;background:var(--bg2);border:1px dashed var(--border2);border-radius:10px;padding:14px;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.gas-input-wrap{display:flex;gap:8px;align-items:stretch}
.gas-input{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--text);font-size:12px;font-family:monospace}
.gas-input:focus{outline:none;border-color:var(--accent)}
.gas-save-btn{background:var(--accent);border:none;border-radius:8px;padding:10px 14px;color:#000;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.xp-settings{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.xp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.xp-row:last-child{border-bottom:none}
.xp-row-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--xp)}

/* ── MENU EDITOR MODAL ── */
.emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.emoji-opt{font-size:24px;padding:6px;border-radius:8px;cursor:pointer;background:var(--bg4);border:2px solid transparent}
.emoji-opt.sel{border-color:var(--accent)}
.color-picker{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.color-opt.sel{border-color:var(--text)}

/* ── TIMER ── */
.timer-overlay{
  display:none;position:fixed;inset:0;background:#0d0f14;z-index:500;
  flex-direction:column;align-items:center;justify-content:center;
}
.timer-overlay.show{display:flex}
.timer-countdown{
  font-family:'Rajdhani',sans-serif;font-size:120px;font-weight:700;
  color:var(--accent);line-height:1;animation:pulse 0.5s ease infinite alternate
}
.timer-ring-wrap{position:relative;width:200px;height:200px;margin:8px 0}
.timer-ring{width:200px;height:200px}
.timer-time{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Rajdhani',sans-serif;font-size:56px;font-weight:700;color:var(--text)
}
.timer-label{font-size:18px;color:var(--text2);margin-bottom:4px;font-weight:500}
.timer-name{font-size:14px;color:var(--text3);margin-top:4px}
.timer-btn-stop{
  background:rgba(255,77,109,0.15);border:1px solid var(--red);
  border-radius:10px;padding:12px 24px;color:var(--red);
  font-size:15px;cursor:pointer;font-family:'Noto Sans JP',sans-serif
}
.timer-btn-pause{
  background:var(--bg4);border:1px solid var(--border2);
  border-radius:10px;padding:12px 24px;color:var(--text2);
  font-size:15px;cursor:pointer;font-family:'Noto Sans JP',sans-serif
}
.preset-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:border-color 0.2s
}
.preset-card:active{border-color:var(--accent)}
.preset-icon{font-size:32px}
.preset-info{flex:1}
.preset-name{font-size:15px;font-weight:500}
.preset-time{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--accent)}
.preset-edit-btns{display:flex;gap:6px}

/* ── LOADING ── */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,15,20,0.85);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;opacity:0;pointer-events:none;z-index:350;animation:confetti-fall 2.5s ease-in forwards}
@keyframes confetti-fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:var(--text2);font-size:13px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="app-title">💪 MUSCLE LOG</div>
    <button class="sync-btn" onclick="syncAll()">
      <span class="sync-dot" id="syncDot"></span>同期
    </button>
  </div>
  <div class="xp-bar-wrap">
    <div class="level-badge" id="levelBadge">Lv.1</div>
    <div class="xp-bar-outer"><div class="xp-bar-inner" id="xpBar" style="width:0%"></div></div>
    <div class="xp-text" id="xpText">0/100 XP</div>
  </div>
  <div style="margin-top:4px;font-size:11px;color:var(--text2)" id="titleBadge">🌱 見習い戦士</div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('home')" id="tab-home"><span class="tab-icon">🏠</span>今日</button>
  <button class="tab-btn" onclick="showTab('history')" id="tab-history"><span class="tab-icon">📅</span>履歴</button>
  <button class="tab-btn" onclick="showTab('stats')" id="tab-stats"><span class="tab-icon">📊</span>統計</button>
  <button class="tab-btn" onclick="showTab('timer')" id="tab-timer"><span class="tab-icon">⏱️</span>タイマー</button>
  <button class="tab-btn" onclick="showTab('settings')" id="tab-settings"><span class="tab-icon">⚙️</span>設定</button>
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div id="setupBanner"></div>
  <div class="section-label">今日のメニュー</div>
  <div class="menu-grid" id="menuGrid"></div>
  <div class="section-label">今日の進捗</div>
  <div id="todayProgress" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:13px;color:var(--text2)">
    メニューをタップして記録しよう！
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <div class="calendar-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="section-label">記録一覧</div>
  <div id="historyList"></div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="chart-wrap">
    <div class="chart-title">直近7日間のセット数</div>
    <div class="bar-chart" id="barChart"></div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">直近7日間の獲得XP</div>
    <div class="bar-chart" id="xpChart"></div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">過去3ヶ月のトレーニング</div>
    <div class="heatmap-grid" id="heatmap"></div>
  </div>
</div>

<!-- TIMER -->
<div class="screen" id="screen-timer">
  <div id="timerPreset" style="margin-bottom:16px">
    <div class="section-label">タイマー選択</div>
    <div id="presetList"></div>
    <button class="add-btn" onclick="openTimerEditor(-1)" style="margin-top:8px">＋ タイマーを追加</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="screen" id="screen-settings">
  <div class="settings-section">
    <div class="settings-title">Google Apps Script URL</div>
    <div style="margin-bottom:8px">
      <div class="gas-input-wrap">
        <input class="gas-input" id="gasUrl" placeholder="https://script.google.com/macros/s/..." type="text">
        <button class="gas-save-btn" onclick="saveGasUrl()">保存</button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">URLを設定後、右上の「同期」ボタンでデータを読み込みます</div>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">メニュー管理</div>
    <div id="menuEditList"></div>
    <button class="add-btn" onclick="openMenuEditor(-1)">＋ メニューを追加</button>
  </div>
  <div class="settings-section">
    <div class="settings-title">経験値 (XP) 設定</div>
    <div class="xp-settings" id="xpSettings"></div>
  </div>
  <div class="settings-section">
    <div class="settings-title">データ管理</div>
    <button class="add-btn" onclick="resetData()" style="border-color:rgba(255,77,109,0.3);color:var(--red)">🗑 全ローカルデータをリセット</button>
  </div>
</div>

<!-- 記録入力 Modal -->
<div class="modal-bg" id="inputModalBg" onclick="closeModal('inputModalBg',event)">
  <div class="modal-inner">
    <div class="modal-title" id="modalTitle">💪 記録を修正</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">タップでセット追加、ここで手動修正できます</div>

<script>
// ── 定数 ──────────────────────────────────────────────────
const EMOJIS  = ['💪','🏋️','🤸','🦵','🫀','🧠','🔥','⚡','🎯','🥊','🏃','🚴'];
const COLORS  = ['#00e5a0','#4dabf7','#ff4d6d','#ffa94d','#cc5de8','#63e6be','#ffd43b','#f783ac'];
const LS_KEY  = 'muscleLog_v2';
const TITLES  = [
  {lv:1,  title:'見習い戦士',    icon:'🌱'},
  {lv:3,  title:'鉄の意志',      icon:'⚔️'},
  {lv:5,  title:'筋肉の芽吹き',  icon:'💪'},
  {lv:8,  title:'鋼の肉体',      icon:'🦾'},
  {lv:10, title:'不屈の闘士',    icon:'🔥'},
  {lv:15, title:'筋肉勇者',      icon:'⚡'},
  {lv:20, title:'鉄人',          icon:'🏋️'},
  {lv:30, title:'筋肉の覇者',    icon:'👑'},
  {lv:50, title:'伝説の肉体',    icon:'🌟'},
  {lv:99, title:'筋肉神',        icon:'🏆'},
];
function getTitle(lv) {
  let t = TITLES[0];
  for (const t2 of TITLES) { if (lv >= t2.lv) t = t2; else break; }
  return t;
}
function getNextTitle(lv) {
  for (const t2 of TITLES) { if (lv < t2.lv) return `Lv.${t2.lv} ${t2.icon} ${t2.title}`; }
  return '最高称号到達！';
}

// ── State ─────────────────────────────────────────────────
let S = {
  gasUrl: '',
  menus: [
    {id:1,name:'胸（プッシュアップ）',icon:'💪',color:'#00e5a0',reps:10,sets:3,xp:30},
    {id:2,name:'腹（クランチ）',      icon:'🤸',color:'#4dabf7',reps:15,sets:3,xp:25},
    {id:3,name:'腕（パームカール）',  icon:'🦵',color:'#ffa94d',reps:12,sets:3,xp:20}
  ],
  records: {},         // { 'YYYY-MM-DD': [{menuId,reps,sets,note,xp}, ...] }
  totalXp: 0,
  level: 1,
  todayDone: {},       // { menuId: {reps,sets,note} }
  lastDate: '',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  editingMenuIdx: -1,
  selectedEmoji: '💪',
  selectedColor: '#00e5a0',
  activeMenuId: null
};

// ── 永続化 ────────────────────────────────────────────────
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    Object.assign(S, d);
  } catch(e) {}
  const td = todayKey();
  if (S.lastDate !== td) { S.todayDone = {}; S.lastDate = td; }
  if (!S.calYear) S.calYear = new Date().getFullYear();
  if (S.calMonth == null) S.calMonth = new Date().getMonth();
}
function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e) {}
}

// ── ユーティリティ ────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function p2(n) { return String(n).padStart(2,'0'); }
function xpForLevel(lv) { let t=0; for(let i=1;i<lv;i++) t+=i*100; return t; }
function calcTotalXp() {
  let total = 0;
  Object.values(S.records).flat().forEach(r => {
    const mn = S.menus.find(x => x.id == r.menuId);
    if (mn) total += mn.xp * r.reps * r.sets;
  });
  return total;
}

function recalcLevel() {
  let lv=1;
  while (S.totalXp >= xpForLevel(lv+1)) lv++;
  S.level = lv;
}

// ── GAS API ───────────────────────────────────────────────
async function gasGet(params) {
  const url = S.gasUrl + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}
async function gasPost(body) {
  const res = await fetch(S.gasUrl, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── 同期 ──────────────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state ? ' '+state : '');
}
async function syncAll() {
  if (!S.gasUrl) {
    alert('設定タブでGAS URLを入力してください');
    showTab('settings');
    return;
  }
  showLoading('同期中...');
  setSyncState('ing');
  try {
    const data = await gasGet({action:'getAll'});
    if (data.error) throw new Error(data.error);
    S.records = data.records || {};
    S.menus   = data.menus   || S.menus;
    S.totalXp = calcTotalXp();
    recalcLevel();
    // 今日分をtodayDoneに反映
    const tk = todayKey();
    S.todayDone = {};
    (S.records[tk]||[]).forEach(r => {
      const mid = Number(r.menuId);
      S.todayDone[mid] = {...r, menuId: mid};
    });
    saveLocal();
    setSyncState('ok');
    updateHeader();
    renderHome();
    hideLoading();
  } catch(e) {
    setSyncState('err');
    hideLoading();
    alert('同期エラー: ' + e.message);
  }
}

async function pushRecord(date, menuId, reps, sets, note, xp) {
  if (!S.gasUrl) return;
  try {
    await gasPost({action:'saveRecord', date, menuId, reps, sets, note, xp});
    await gasPost({action:'saveState',  state:{totalXp: S.totalXp, level: S.level}});
    setSyncState('ok');
  } catch(e) { setSyncState('err'); }
}

async function pushMenus() {
  if (!S.gasUrl) return;
  try {
    await gasPost({action:'saveMenus', menus: S.menus});
    setSyncState('ok');
  } catch(e) { setSyncState('err'); }
}

// ── Loading overlay ───────────────────────────────────────
function showLoading(txt) {
  document.getElementById('loadingTxt').textContent = txt||'処理中...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// ── ヘッダー更新 ──────────────────────────────────────────
function updateHeader() {
  recalcLevel();  // 常にtotalXpから再計算
  const xpNeeded = S.level * 100;
  const xpInLevel = S.totalXp - xpForLevel(S.level);
  const pct = Math.min(100, Math.round(xpInLevel / xpNeeded * 100));
  const t = getTitle(S.level);
  document.getElementById('levelBadge').textContent = `Lv.${S.level}`;
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('xpText').textContent = `${xpInLevel}/${xpNeeded} XP`;
  const titleEl = document.getElementById('titleBadge');
  if (titleEl) titleEl.textContent = `${t.icon} ${t.title}`;
}

// ── タブ切り替え ──────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='history')  renderCalendar();
  if (name==='stats')    renderStats();
  if (name==='settings') renderSettings();
  if (name==='timer')    renderTimerTab();
}

// ── HOME ──────────────────────────────────────────────────
function renderHome() {
  // Setup banner
  const banner = document.getElementById('setupBanner');
  banner.innerHTML = S.gasUrl ? '' : `
    <div class="setup-banner">
      <strong>⚙️ 初期設定が必要です</strong>
      設定タブでGoogle Apps ScriptのURLを入力すると、スプレッドシートにデータが保存されます。
    </div>`;

  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  S.menus.forEach(m => {
    const rec  = S.todayDone[m.id];
    const curSets = rec ? rec.sets : 0;
    const done = curSets >= m.sets;
    grid.innerHTML += `
      <div class="menu-card${done?' done':''}" style="--card-color:${m.color}"
        onclick="quickTap(${m.id})"
        oncontextmenu="openEdit(${m.id});return false;"
        onpointerdown="startLongPress(${m.id})"
        onpointerup="cancelLongPress()"
        onpointerleave="cancelLongPress()">
        <div class="menu-card-icon">${m.icon}</div>
        <div class="menu-card-name">${m.name}</div>
        <div class="menu-card-sets" style="margin-top:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          ${Array.from({length: m.sets}, (_, i) =>
            `<span style="width:10px;height:10px;border-radius:50%;background:${i < curSets ? m.color : 'var(--bg4)'};border:1px solid ${m.color};display:inline-block"></span>`
          ).join('')}
          <span style="font-size:11px;color:${curSets>0?m.color:'var(--text3)'};margin-left:2px">${curSets}/${m.sets}セット</span>
        </div>
        ${done?`<div class="done-stamp">✓ DONE</div>`:''}
        <div class="menu-card-check" style="background:${m.color}">✓</div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">長押しで編集</div>
      </div>`;
  });
  renderTodayProgress();
}

function renderTodayProgress() {
  const el = document.getElementById('todayProgress');
  const keys = Object.keys(S.todayDone);
  if (!keys.length) { el.innerHTML = '<span style="color:var(--text3)">まだ記録がありません。メニューをタップして記録しよう！</span>'; return; }
  el.innerHTML = keys.map(id => {
    const m = S.menus.find(x => x.id == id); if (!m) return '';
    const r = S.todayDone[id];
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:20px">${m.icon}</span>
      <span style="flex:1;font-size:13px">${m.name}</span>
      <span style="font-size:12px;color:var(--text2)">${r.reps}回×${r.sets}セット</span>
      <span style="font-size:11px;color:var(--xp);font-family:'Rajdhani',sans-serif">+${m.xp}XP</span>
      <button onclick="deleteToday(${id})" style="background:rgba(255,77,109,0.15);border:1px solid rgba(255,77,109,0.3);border-radius:6px;padding:4px 8px;color:var(--red);font-size:12px;cursor:pointer;flex-shrink:0">削除</button>
    </div>`;
  }).join('');
}

async function deleteToday(id) {
  if (!confirm('この記録を削除しますか？')) return;
  delete S.todayDone[id];
  const tk = todayKey();
  if (S.records[tk]) {
    S.records[tk] = S.records[tk].filter(r => r.menuId != id);
    if (!S.records[tk].length) delete S.records[tk];
  }
  S.totalXp = calcTotalXp();
  recalcLevel();
  saveLocal();
  updateHeader();
  renderHome();
  if (S.gasUrl) {
    setSyncState('ing');
    try {
      await gasPost({action:'deleteRecord', date: tk, menuId: id});
      await gasPost({action:'saveState', state:{totalXp: S.totalXp, level: S.level}});
      setSyncState('ok');
    } catch(e) { setSyncState('err'); }
  }
}

// ── 記録入力 ──────────────────────────────────────────────
let longPressTimer = null;

function startLongPress(id) {
  longPressTimer = setTimeout(() => { openEdit(id); }, 600);
}
function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

function quickTap(id) {
  cancelLongPress();
  const m = S.menus.find(x => x.id === id); if (!m) return;
  const tk = todayKey();
  const cur = S.todayDone[id];
  const curSets = cur ? cur.sets : 0;
  const newSets = curSets + 1;

  const rec = {menuId: id, reps: m.reps, sets: newSets, note: cur?.note||''};
  S.todayDone[id] = rec;
  if (!S.records[tk]) S.records[tk] = [];
  const idx = S.records[tk].findIndex(r => r.menuId == id);
  if (idx >= 0) S.records[tk][idx] = {...rec};
  else S.records[tk].push({...rec});

  // XP再集計：全records（今日含む）を回数×セット×単価で合計
  const wasLv = S.level;
  S.totalXp = calcTotalXp();
  recalcLevel();
  saveLocal();
  renderHome();
  updateHeader();
  showXpPopup(m.xp * m.reps);
  if (S.level > wasLv) setTimeout(() => showLevelUp(S.level), 800);
  setSyncState('ing');
  pushRecord(tk, id, m.reps, newSets, cur?.note||'', m.xp);
}

function openEdit(id) {
  const m = S.menus.find(x => x.id === id); if (!m) return;
  S.activeMenuId = id;
  document.getElementById('modalTitle').innerHTML = `${m.icon} ${m.name}`;
  document.getElementById('inputReps').value = S.todayDone[id]?.reps ?? m.reps;
  document.getElementById('inputSets').value = S.todayDone[id]?.sets ?? 0;
  document.getElementById('inputNote').value = S.todayDone[id]?.note ?? '';
  document.getElementById('inputModalBg').classList.add('open');
}

async function saveRecord() {
  const id  = S.activeMenuId;
  const m   = S.menus.find(x => x.id === id); if (!m) return;
  const reps = parseInt(document.getElementById('inputReps').value) || m.reps;
  const sets = parseInt(document.getElementById('inputSets').value) || m.sets;
  const note = document.getElementById('inputNote').value;
  const tk   = todayKey();

  const alreadyDone = !!S.todayDone[id];

  // 常に上書き（1メニュー1日1記録）
  S.todayDone[id] = {menuId: id, reps, sets, note, xp: m.xp};
  if (!S.records[tk]) S.records[tk] = [];
  const idx = S.records[tk].findIndex(r => r.menuId == id);
  if (idx >= 0) S.records[tk][idx] = {menuId:id,reps,sets,note,xp:m.xp};
  else S.records[tk].push({menuId:id,reps,sets,note,xp:m.xp});

  // XP = 今日完了したメニューのXP合計（重複なし）
  const todayXp = Object.keys(S.todayDone).reduce((a, mid) => {
    const menu = S.menus.find(x => x.id == mid);
    return a + (menu ? menu.xp : 0);
  }, 0);
  // 過去分XP + 今日分XP で再計算
  const pastXp = Object.entries(S.records)
    .filter(([k]) => k !== tk)
    .flatMap(([, recs]) => recs)
    .reduce((a, r) => a + Number(r.xp), 0);
  const wasLv = S.level;
  S.totalXp = pastXp + todayXp;
  recalcLevel();
  saveLocal();
  closeModal('inputModalBg');
  renderHome();
  updateHeader();
  if (!alreadyDone) {
    showXpPopup(m.xp);
    if (S.level > wasLv) setTimeout(() => showLevelUp(S.level), 800);
  }

  // GASに非同期でプッシュ
  setSyncState('ing');
  pushRecord(tk, id, reps, sets, note, m.xp);
}

// ── モーダル制御 ──────────────────────────────────────────
function closeModal(id, e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById(id).classList.remove('open');
}

// ── XP/レベルアップ演出 ───────────────────────────────────
function showXpPopup(xp) {
  const p = document.getElementById('xpPopup');
  document.getElementById('xpPopupAmt').textContent = '+' + xp;
  p.classList.add('show');
  setTimeout(() => { p.classList.remove('show'); p.classList.add('hide'); setTimeout(()=>p.classList.remove('hide'),300); }, 1200);
}
const LEVELUP_MSGS = [
  '継続は力なり。その汗は嘘をつかない！',
  'また一段と強くなった。止まるな！',
  '努力は必ず報われる。証明し続けろ！',
  'その痛みが、明日の自分を作る！',
  '限界？それはまだ先だ！',
  'お前の意志は鋼鉄より硬い！',
  '今日の積み重ねが伝説になる！',
];

function launchConfetti() {
  const colors = ['#00e5a0','#ffd43b','#ff4d6d','#4dabf7','#cc5de8','#ffa94d'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 1.2 + 's';
    el.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = el.style.width;
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function showLevelUp(lv) {
  const t = getTitle(lv);
  const prevT = getTitle(lv - 1);
  const newTitle = t.lv === lv || prevT.title !== t.title;
  const msg = LEVELUP_MSGS[Math.floor(Math.random() * LEVELUP_MSGS.length)];
  document.getElementById('levelupNum').textContent = lv;
  const subEl = document.getElementById('levelupSub');
  subEl.innerHTML = newTitle
    ? `称号が変わった！<br><span style="font-size:22px;color:var(--accent)">${t.icon} ${t.title}</span><br><span style="font-size:13px;color:var(--text2);margin-top:8px;display:block">${msg}</span>`

function calcStreak() {
  let s=0; const d=new Date();
  while(true) {
    const k=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    if (S.records[k]?.length) s++; else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

  const vals=days.map(d=>{
    const k=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;

// ── BGM生成（ユーロビート風） ────────────────────────────
let bgmState = { playing: false, scheduleId: null, nextBeat: 0, beat: 0, chord: 0, dropped: false };

const BGM_BPM   = 147;
const BGM_BEAT  = 60 / BGM_BPM;       // 1拍の長さ（秒）
const BGM_STEP  = BGM_BEAT / 4;       // 16分音符

// F -> G -> Em -> Am （哀愁王道進行）
// [ルート, 3rd, 5th]  中高音域
const CHORDS = [
  [349.2, 440.0, 523.3],  // F
  [392.0, 493.9, 587.3],  // G
  [329.6, 392.0, 493.9],  // Em
  [220.0, 261.6, 329.6],  // Am
];

// 哀愁リードメロディ（32ステップ、コード構成音インデックス or null）
// F -> G -> Em -> Am を2周で1ループ
const MELODY = [
  // F
  2,null,1,null,0,null,2,1,
  // G
  2,null,null,1,2,null,1,0,
  // Em
  1,2,null,2,1,null,0,null,
  // Am
  2,null,1,0,null,1,2,null,
  // F (2周目)
  1,null,2,null,2,1,0,null,
  // G
  2,null,1,null,2,null,null,1,
  // Em
  0,1,2,null,1,null,2,null,
  // Am
  2,1,null,0,null,null,1,2,
];

function toggleBGM() {
  if (bgmState.playing) {
    stopBGM();
  } else {
    // タイマー動作中ならドロップモードで再開
    startBGM(timerState.running);
  }
}

function startBGM(drop=false) {
  if (bgmState.playing) return;
  bgmState.playing  = true;
  bgmState.beat     = 0;
  bgmState.chord    = 0;
  bgmState.dropped  = drop;
  bgmState.nextBeat = getAudioCtx().currentTime + 0.05;
  scheduleBGM();
  document.getElementById('bgmBtn').textContent = '🔇 BGM OFF';
}

function stopBGM() {
  bgmState.playing = false;
  clearTimeout(bgmState.scheduleId);
  bgmState.scheduleId = null;
  document.getElementById('bgmBtn').textContent = '🎵 BGM ON';
}

function scheduleBGM() {
  if (!bgmState.playing) return;
  const ctx       = getAudioCtx();
  const LOOKAHEAD = 0.25;

  while (bgmState.nextBeat < ctx.currentTime + LOOKAHEAD) {
    const step      = bgmState.beat % 64;
    const chordIdx  = Math.floor(step / 16) % CHORDS.length;
    // 経過秒数（BGM開始からの時間）
    const elapsed   = bgmState.beat * BGM_STEP;

    playStep(bgmState.nextBeat, step, chordIdx, elapsed);

    bgmState.beat++;
    bgmState.nextBeat += BGM_STEP;
  }
  bgmState.scheduleId = setTimeout(scheduleBGM, 80);
}

function playStep(time, step, chordIdx, elapsed) {
  const ctx  = getAudioCtx();
  const b16  = step % 16;
  const root = CHORDS[chordIdx][0];

  // ── タイムライン判定 ─────────────────────────────────
  // elapsed は BGM開始からの秒数
  // timerState.total を使ってスケール（60秒想定だが任意の秒数でも動く）
  const total    = timerState.total || 60;
  const tRemain  = timerState.remaining || 0;
  // タイマーが動いていない場合は elapsed そのまま使用
  const sec = timerState.running ? (total - tRemain) : elapsed;

  const isIntro      = sec < 5;                        // 0〜5秒
  const isAB         = sec >= 5  && sec < 20;          // 5〜20秒
  const isChorus     = sec >= 20 && sec < 45;          // 20〜45秒
  const isLastSprint = sec >= 45 && sec < (total - 5); // 45〜55秒
  const isFinish     = sec >= (total - 5);             // 残り5秒

  // ── 【イントロ】ハイハット＋シンセのみ ────────────────
  if (isIntro) {
    if (b16 % 4 === 2) playHihat(ctx, time, 0.15, true);
    if (b16 === 0) playSynth(ctx, time, CHORDS[chordIdx], 0.10);
    return;
  }

  // ── 【フィニッシュ】ドラムロール ──────────────────────
  if (isFinish) {
    // 8分音符でスネアロール
    if (b16 % 2 === 0) playSnare(ctx, time);
    // ハイハット高速
    playHihat(ctx, time, 0.2, false);
    return;
  }

  // ── 共通：ハイハット ──────────────────────────────────
  if (isLastSprint) {
    // ラストスパート：16分全部刻む
    playHihat(ctx, time, b16 % 2 === 0 ? 0.08 : 0.30, b16 % 2 === 1);
  } else {
    // 通常：裏打ち
    if (b16 % 2 === 0) playHihat(ctx, time, 0.07, false);
    else               playHihat(ctx, time, 0.25, true);
  }

  // ── キック：4つ打ち ───────────────────────────────────
  if (b16 % 4 === 0) playKick(ctx, time);

  // ── スネア＋クラップ ──────────────────────────────────
  if (b16 === 4 || b16 === 12) {
    playSnare(ctx, time);
    playClap(ctx, time);
  }

  // ── オクターブベース ──────────────────────────────────
  if (b16 === 0 || b16 === 2)  playBass(ctx, time, root * 0.5, 0.40);
  if (b16 === 4 || b16 === 6)  playBass(ctx, time, root,       0.28);
  if (b16 === 8 || b16 === 10) playBass(ctx, time, root * 0.5, 0.40);
  if (b16 === 12|| b16 === 14) playBass(ctx, time, root,       0.28);

  // ── シンセコード ──────────────────────────────────────
  if (b16 === 0) playSynth(ctx, time, CHORDS[chordIdx], 0.07);

  // ── リードメロディ（サビ以降のみ）────────────────────
  if (isChorus || isLastSprint) {
    const melIdx = MELODY[step % MELODY.length];
    if (melIdx !== null) {
      // ラストスパートは1オクターブ上
      const octave = isLastSprint ? 4 : 2;
      playLead(ctx, time, CHORDS[chordIdx][melIdx] * octave);
    }
  }
}

// ── 楽器 ──────────────────────────────────────────────
function playKick(ctx, time) {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
  gain.gain.setValueAtTime(1.1, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
  osc.start(time); osc.stop(time + 0.25);
}

function playSnare(ctx, time) {
  const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.18, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++)
    data[i] = (Math.random()*2-1) * Math.exp(-i / (ctx.sampleRate * 0.04));
  const src  = ctx.createBufferSource();
  const gain = ctx.createGain();
  const fil  = ctx.createBiquadFilter();
  src.buffer = buf;
  fil.type = 'highpass'; fil.frequency.value = 800;
  src.connect(fil); fil.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.55, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
  src.start(time); src.stop(time + 0.18);
}

function playClap(ctx, time) {
  for (let i = 0; i < 3; i++) {
    const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let j = 0; j < data.length; j++) data[j] = (Math.random()*2-1);
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    const fil  = ctx.createBiquadFilter();
    src.buffer = buf;
    fil.type = 'bandpass'; fil.frequency.value = 1100; fil.Q.value = 0.7;
    src.connect(fil); fil.connect(gain); gain.connect(ctx.destination);
    const t = time + i * 0.012;
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src.start(t); src.stop(t + 0.06);
  }
}

function playHihat(ctx, time, vol, open) {
  const dur  = open ? 0.08 : 0.03;
  const buf  = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1);
  const src  = ctx.createBufferSource();
  const gain = ctx.createGain();
  const fil  = ctx.createBiquadFilter();
  src.buffer = buf;
  fil.type = 'highpass'; fil.frequency.value = open ? 7000 : 9000;
  src.connect(fil); fil.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
  src.start(time); src.stop(time + dur + 0.01);
}

function playBass(ctx, time, freq, vol) {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  const fil  = ctx.createBiquadFilter();
  osc.connect(fil); fil.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.value = freq;
  fil.type = 'lowpass'; fil.frequency.value = 600;
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + BGM_STEP * 1.8);
  osc.start(time); osc.stop(time + BGM_STEP * 2);
}

function playSynth(ctx, time, freqs, vol) {
  freqs.forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol * (i === 0 ? 1 : 0.6), time);
    gain.gain.setValueAtTime(vol * 0.5 * (i === 0 ? 1 : 0.6), time + BGM_STEP * 8);
    gain.gain.exponentialRampToValueAtTime(0.001, time + BGM_STEP * 15.5);
    osc.start(time); osc.stop(time + BGM_STEP * 16);
  });
}

function playLead(ctx, time, freq) {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  const fil  = ctx.createBiquadFilter();
  osc.connect(fil); fil.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.value = freq;
  fil.type = 'lowpass';
  fil.frequency.setValueAtTime(4000, time);
  fil.frequency.exponentialRampToValueAtTime(1500, time + BGM_STEP * 0.8);
  gain.gain.setValueAtTime(0.22, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + BGM_STEP * 0.85);
  osc.start(time); osc.stop(time + BGM_STEP);
}

// ── タイマー機能 ─────────────────────────────────────────
const DEFAULT_TIMERS = [
  {id:1, name:'プランク',           icon:'🧘', seconds:30, bgm:false},
  {id:2, name:'ジャンプダイエット', icon:'🦘', seconds:60, bgm:true},
];

let timerState = {
  timers: [...DEFAULT_TIMERS],
  intervalId: null,
  remaining: 0,
  total: 0,
  paused: false,
  editingIdx: -1,
  running: false,
};

// AudioContextは1つだけ作る
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function beep(freq, startOffset, duration, vol=0.35) {
  try {
    const ctx = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + startOffset;
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.start(t0);
    osc.stop(t0 + duration + 0.05);
  } catch(e) { console.warn('beep error', e); }
}

function loadTimers() {
  try {
    const d = JSON.parse(localStorage.getItem('muscleTimers')||'null');
    if (d) timerState.timers = d;
  } catch(e){}
}
function saveTimers() {
  try { localStorage.setItem('muscleTimers', JSON.stringify(timerState.timers)); } catch(e){}
}

function renderTimerTab() {
  const list = document.getElementById('presetList');
  list.innerHTML = timerState.timers.map((t,i) => {
    const m = Math.floor(t.seconds/60);
    const s = t.seconds % 60;
    const label = m > 0 ? `${m}分${s > 0 ? s+'秒' : ''}` : `${s}秒`;
    return `<div class="preset-card">
      <div class="preset-icon" onclick="startTimer(${i})">${t.icon}</div>
      <div class="preset-info" onclick="startTimer(${i})">
        <div class="preset-name">${t.name} ${t.bgm ? '<span style="font-size:10px;color:var(--accent)">🎵</span>' : ''}</div>
        <div class="preset-time">${label}</div>
      </div>
      <div class="preset-edit-btns">
        <button class="btn-edit" onclick="openTimerEditor(${i});event.stopPropagation()">編集</button>
        <button class="btn-delete" onclick="deleteTimer(${i});event.stopPropagation()">削除</button>
      </div>
    </div>`;
  }).join('');
}

function startTimer(idx) {
  // 多重起動防止
  if (timerState.running) stopTimer();

  const t = timerState.timers[idx];
  timerState.total     = t.seconds;
  timerState.remaining = t.seconds;
  timerState.paused    = false;
  timerState.running   = true;

  const overlay    = document.getElementById('timerOverlay');
  const countdown  = document.getElementById('timerCountdown');
  const label      = document.getElementById('timerLabel');
  const ringWrap   = document.querySelector('.timer-ring-wrap');
  const ring       = document.getElementById('timerRingCircle');

  overlay.classList.add('show');
  countdown.style.display = 'block';
  ringWrap.style.display  = 'none';
  countdown.style.color   = 'var(--accent)';
  document.getElementById('timerName').textContent = `${t.icon} ${t.name}`;
  document.getElementById('timerPauseBtn').textContent = '⏸ 一時停止';

  // 3・2・1・GO カウントダウン
  // タイマーのBGM設定に従って自動制御
  const useBGM = t.bgm !== false;
  document.getElementById('bgmBtn').textContent = useBGM ? '🔇 BGM OFF' : '🎵 BGM ON';
  stopBGM();

  let count = 3;
  countdown.textContent = count;
  label.textContent = '準備して！';

  beep(880, 0, 0.15);
  // カウントダウン中はBGMなし。GO!後にドロップ開始。

  const cdId = setInterval(() => {
    count--;
    if (count > 0) {
      countdown.textContent = count;
      beep(880, 0, 0.15);
    } else {
      clearInterval(cdId);
      countdown.textContent = 'GO!';
      label.textContent = t.name;
      beep(1100, 0, 0.3, 0.5);
      // GO!でドロップ（BGMありタイマーのみ）
      if (useBGM) {
        stopBGM();
        setTimeout(() => startBGM(true), 50);
      }

      setTimeout(() => {
        if (!timerState.running) return;
        countdown.style.display = 'none';
        ringWrap.style.display  = 'block';
        updateTimerDisplay();

        // リングアニメーション開始
        ring.style.transition = 'none';
        ring.setAttribute('stroke-dashoffset', '0');
        ring.setAttribute('stroke', '#00e5a0');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            ring.style.transition = `stroke-dashoffset ${t.seconds}s linear`;
            ring.setAttribute('stroke-dashoffset', '553');
          });
        });

        // setIntervalは1つだけ
        clearInterval(timerState.intervalId);
        timerState.intervalId = setInterval(() => {
          if (!timerState.paused) {
            timerState.remaining--;
            updateTimerDisplay();
            if (timerState.remaining <= 0) {
              clearInterval(timerState.intervalId);
              timerState.intervalId = null;
              finishTimer();
            }
          }
        }, 1000);
      }, 700);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const r = timerState.remaining;
  const m = Math.floor(r / 60);
  const s = r % 60;
  document.getElementById('timerTime').textContent =
    m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}`;
  const color = r <= 10 ? '#ff4d6d' : '#00e5a0';
  document.getElementById('timerRingCircle').setAttribute('stroke', color);
  document.getElementById('timerTime').style.color = r <= 10 ? 'var(--red)' : 'var(--text)';
}

function finishTimer() {
  timerState.running = false;
  // 完了音：ピピピピッ×2 けたたましいアラーム
  const alarmFreq = 1800;
  const pattern = [0, 0.12, 0.24, 0.36, 0.6, 0.72, 0.84, 0.96];
  pattern.forEach(t => beep(alarmFreq, t, 0.1, 0.8));
  // 最後に低い音でフィニッシュ
  beep(900, 1.2, 0.4, 0.6);

  const countdown = document.getElementById('timerCountdown');
  const ringWrap  = document.querySelector('.timer-ring-wrap');
  countdown.style.display = 'block';
  countdown.textContent   = '✓';
  countdown.style.color   = 'var(--accent)';
  ringWrap.style.display  = 'none';
  document.getElementById('timerLabel').textContent = '完了！おつかれさまでした！';

  setTimeout(() => stopTimer(), 2500);
}

function stopTimer() {
  clearInterval(timerState.intervalId);
  timerState.intervalId = null;
  timerState.running    = false;
  timerState.paused     = false;
  stopBGM();
  document.getElementById('timerOverlay').classList.remove('show');
  // 表示リセット
  document.getElementById('timerCountdown').style.display = 'block';
  document.querySelector('.timer-ring-wrap').style.display = 'none';
}

function togglePause() {
  timerState.paused = !timerState.paused;
  const btn  = document.getElementById('timerPauseBtn');
  const ring = document.getElementById('timerRingCircle');

  if (timerState.paused) {
    btn.textContent = '▶ 再開';
    // BGMも止める
    stopBGM();
    // 経過時間から現在のoffset位置を計算（0スタート→553ゴール）
    const elapsed = timerState.total - timerState.remaining;
    const current = Math.round(elapsed / timerState.total * 553);
    ring.style.transition = 'none';
    ring.setAttribute('stroke-dashoffset', String(current));
    timerState.pausedOffset = current;
  } else {
    btn.textContent = '⏸ 一時停止';
    // BGMも再開（ドロップモード）
    startBGM(true);
    // 一時停止位置から残り時間かけて553まで進める
    const from = timerState.pausedOffset ?? 0;
    ring.style.transition = 'none';
    ring.setAttribute('stroke-dashoffset', String(from));
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        ring.style.transition = `stroke-dashoffset ${timerState.remaining}s linear`;
        ring.setAttribute('stroke-dashoffset', '553');
      });
    });
  }
}

function openTimerEditor(idx) {
  timerState.editingIdx = idx;
  const t = idx >= 0 ? timerState.timers[idx] : null;
  document.getElementById('teName').value    = t?.name    ?? '';
  document.getElementById('teSeconds').value = t?.seconds ?? 60;
  document.getElementById('teBgm').checked   = t?.bgm ?? false;
  document.getElementById('timerEditorTitle').textContent = idx >= 0 ? 'タイマーを編集' : 'タイマーを追加';
  const ep       = document.getElementById('timerEmojiPicker');
  const selEmoji = t?.icon ?? '⏱️';
  ep.innerHTML   = ['⏱️','🧘','🦘','💪','🔥','⚡','🏃','🤸','🧗','🥊'].map(e =>
    `<div class="emoji-opt${e===selEmoji?' sel':''}" onclick="selTimerEmoji('${e}')">${e}</div>`
  ).join('');
  document.getElementById('timerEditorModal').classList.add('open');
}

function selTimerEmoji(e) {
  document.querySelectorAll('#timerEmojiPicker .emoji-opt')
    .forEach(el => el.classList.toggle('sel', el.textContent.trim() === e));
}

function saveTimerEditor() {
  const name = document.getElementById('teName').value.trim();
  if (!name) { alert('名前を入力してください'); return; }
  const seconds = parseInt(document.getElementById('teSeconds').value) || 60;
  const icon    = document.querySelector('#timerEmojiPicker .emoji-opt.sel')?.textContent.trim() ?? '⏱️';
  const bgm = document.getElementById('teBgm').checked;
  const obj = {
    id:      timerState.editingIdx >= 0 ? timerState.timers[timerState.editingIdx].id : Date.now(),
    name, icon, seconds, bgm
  };
  if (timerState.editingIdx >= 0) timerState.timers[timerState.editingIdx] = obj;
  else timerState.timers.push(obj);
  saveTimers();
  renderTimerTab();
  closeModal('timerEditorModal');
}

function deleteTimer(i) {
  if (!confirm('このタイマーを削除しますか？')) return;
  timerState.timers.splice(i, 1);
  saveTimers();
  renderTimerTab();
}

// ── ServiceWorker登録 ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // 新バージョン検出→自動リロード
          newWorker.postMessage({action: 'skipWaiting'});
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}

// ── 初期化 ───────────────────────────────────────────────
loadLocal();
loadTimers();
// 起動時に必ずXP・レベルをrecordsから再計算（localStorageの古い値を上書き）
S.totalXp = calcTotalXp();
recalcLevel();
updateHeader();
renderHome();
document.getElementById('gasUrl').value = S.gasUrl || '';
if (S.gasUrl) {
  setSyncState('ing');
  syncAll();
}
</script>
